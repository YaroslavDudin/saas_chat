services:
  db:
    image: postgres:15
    container_name: saas_chat_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=chatbot_db
      - POSTGRES_USER=chatbot_user
      - POSTGRES_PASSWORD=chatbot_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot_user -d chatbot_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./server
    container_name: saas_chat_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DB_NAME=chatbot_db
      - DB_USER=chatbot_user
      - DB_PASSWORD=chatbot_password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    container_name: saas_chat_dashboard
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://web:8000
    depends_on:
      - web

  client:
    build: ./client
    container_name: saas_chat_client
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    environment:
      - VITE_PROXY_TARGET=http://web:8000
    depends_on:
      - web

volumes:
  postgres_data:
